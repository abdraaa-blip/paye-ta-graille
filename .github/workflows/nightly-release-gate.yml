name: Nightly Release Gate

on:
  schedule:
    # Tous les jours a 03:17 UTC
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-release-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install
        run: npm ci
      - name: Nightly strict release gate
        run: npm run verify:release
        env:
          NEXT_PUBLIC_SITE_URL: https://ci-placeholder.example
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: anon-key-placeholder-for-ci-build-only
          GOOGLE_PLACES_API_KEY: ci-google-placeholder
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ci-google-placeholder
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-nightly-release-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
      - name: Nightly gate summary
        if: always()
        run: >
          bash scripts/ci/write-gate-summary.sh
          "Nightly release gate"
          "npm run verify:release"
          "strict release verification (desktop + mobile + beta SEO)"
          "playwright-nightly-release-report"
