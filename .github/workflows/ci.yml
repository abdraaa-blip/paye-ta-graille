name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Lint GitHub Actions workflows
        uses: rhysd/actionlint@v1.7.12

  verify:
    needs: [workflow-lint]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install
        run: npm ci
      - name: Lint and typecheck
        run: npm run verify
      - name: Deploy preflight checks
        run: npm run deploy:preflight
        env:
          NEXT_PUBLIC_SITE_URL: https://ci-placeholder.example
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: anon-key-placeholder-for-ci-build-only
          GOOGLE_PLACES_API_KEY: ci-google-placeholder
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ci-google-placeholder
          PTG_PREFLIGHT_ALLOW_MISSING_PLACES: "0"
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://ci-placeholder.example
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: anon-key-placeholder-for-ci-build-only
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('package-lock.json') }}
      - name: Playwright (smoke HTTP + E2E)
        run: |
          npx playwright install chromium
          npm run test:e2e
        env:
          NEXT_PUBLIC_SITE_URL: https://ci-placeholder.example
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: anon-key-placeholder-for-ci-build-only
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-verify-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  beta-seo:
    needs: [workflow-lint]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install
        run: npm ci
      - name: Preflight in public beta mode
        run: npm run deploy:preflight
        env:
          NEXT_PUBLIC_SITE_URL: https://ci-placeholder.example
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: anon-key-placeholder-for-ci-build-only
          GOOGLE_PLACES_API_KEY: ci-google-placeholder
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ci-google-placeholder
          NEXT_PUBLIC_PTG_PUBLIC_BETA: "1"
      - name: Build in public beta mode
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://ci-placeholder.example
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: anon-key-placeholder-for-ci-build-only
          NEXT_PUBLIC_PTG_PUBLIC_BETA: "1"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('package-lock.json') }}
      - name: Playwright beta SEO
        run: |
          npx playwright install chromium
          npm run test:e2e:beta-seo
        env:
          PTG_RUN_BETA_E2E: "1"
          NEXT_PUBLIC_SITE_URL: https://ci-placeholder.example
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: anon-key-placeholder-for-ci-build-only
          NEXT_PUBLIC_PTG_PUBLIC_BETA: "1"
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-beta-seo-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  mobile-consistency:
    needs: [workflow-lint]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://ci-placeholder.example
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: anon-key-placeholder-for-ci-build-only
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('package-lock.json') }}
      - name: Playwright mobile consistency
        run: |
          npx playwright install chromium
          npm run test:e2e:mobile
        env:
          NEXT_PUBLIC_SITE_URL: https://ci-placeholder.example
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: anon-key-placeholder-for-ci-build-only
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-mobile-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
      - name: Mobile gate summary
        if: always()
        run: |
          echo "### Mobile consistency gate" >> $GITHUB_STEP_SUMMARY
          echo "- Suite: npm run test:e2e:mobile" >> $GITHUB_STEP_SUMMARY
          echo "- Device profile: Pixel 7 (Playwright mobile config)" >> $GITHUB_STEP_SUMMARY
          echo "- Failure artifacts: playwright-mobile-report" >> $GITHUB_STEP_SUMMARY
